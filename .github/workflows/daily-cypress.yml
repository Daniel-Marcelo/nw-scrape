name: Daily Price Fetch

on:
  schedule:
    - cron: "0 8 * * 1-5"  # 8am UTC Mon-Fri (market open)
    - cron: "0 13 * * 1-5" # 1pm UTC Mon-Fri (midday)
    - cron: "0 21 * * 1-5" # 9pm UTC Mon-Fri (after US close)
  workflow_dispatch:

jobs:
  fetch-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node modules
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Fetch prices and save to Firebase
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: node fetch-prices.js
